<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SkyCast Pro | Enterprise Weather Intelligence</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;800&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --panel-bg: rgba(255, 255, 255, 0.05);
            --text-color: white;
            --bg-filter: brightness(0.4) saturate(1.2);
        }

        /* Mode Styles */
        body.light-mode {
            --panel-bg: rgba(255, 255, 255, 0.7);
            --text-color: #1e293b;
            --bg-filter: brightness(0.9) saturate(1);
            background: #f1f5f9;
        }

        body.dark-mode {
            --panel-bg: rgba(15, 23, 42, 0.8);
            --text-color: #f8fafc;
            --bg-filter: brightness(0.3) saturate(1.4);
            background: #020617;
        }

        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            margin: 0;
            overflow-x: hidden;
            background: #0f172a;
            color: var(--text-color);
            transition: all 0.5s ease;
        }

        #bg-overlay {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            z-index: -1;
            background-size: cover;
            background-position: center;
            transition: background 1.5s ease-in-out, filter 0.5s ease;
            filter: var(--bg-filter);
        }

        .glass-panel {
            background: var(--panel-bg);
            backdrop-filter: blur(20px) saturate(180%);
            -webkit-backdrop-filter: blur(20px) saturate(180%);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 32px;
            transition: background 0.5s ease;
        }

        .mode-btn {
            @apply p-3 rounded-xl border border-white/10 bg-white/5 hover:bg-blue-600 transition-all text-xs font-bold uppercase;
        }

        .weather-card-active {
            background: linear-gradient(135deg, rgba(59, 130, 246, 0.5) 0%, rgba(37, 99, 235, 0.2) 100%);
            border: 1px solid rgba(255, 255, 255, 0.3);
            transform: scale(1.05);
            color: white !important;
        }

        @keyframes pulse-slow { 0%, 100% { opacity: 1; } 50% { opacity: 0.7; } }
        .live-dot { animation: pulse-slow 2s infinite; }
    </style>
</head>
<body>

    <div id="bg-overlay"></div>

    <div class="min-h-screen p-4 md:p-8 lg:p-12">
        <header class="max-w-7xl mx-auto flex flex-col md:flex-row justify-between items-center gap-6 mb-12">
            <div class="flex items-center gap-4">
                <div class="w-12 h-12 bg-blue-600 rounded-2xl flex items-center justify-center shadow-lg shadow-blue-500/40">
                    <i class="fas fa-satellite-dish text-white text-xl"></i>
                </div>
                <div>
                    <h1 class="text-3xl font-extrabold tracking-tighter italic">SKYCAST <span class="text-blue-500">PRO</span></h1>
                </div>
            </div>

            <div class="flex items-center w-full md:w-auto gap-4">
                <div class="flex gap-2 mr-4">
                    <button onclick="changeMode('light')" class="mode-btn" title="Light"><i class="fas fa-sun"></i></button>
                    <button onclick="changeMode('dark')" class="mode-btn" title="Dark"><i class="fas fa-moon"></i></button>
                    <button onclick="changeMode('default')" class="mode-btn" title="Default"><i class="fas fa-wand-magic-sparkles"></i></button>
                </div>

                <div class="relative flex-1 md:w-80">
                    <i class="fas fa-search absolute left-4 top-1/2 -translate-y-1/2 opacity-40"></i>
                    <input type="text" id="citySearch" placeholder="Search City..." 
                           class="w-full bg-white/10 border border-white/10 rounded-2xl py-4 pl-12 pr-4 focus:ring-2 ring-blue-500 transition-all outline-none backdrop-blur-md text-current">
                </div>
                <button onclick="fetchWeatherData()" class="bg-blue-600 hover:bg-blue-500 px-8 py-4 rounded-2xl font-bold transition-all shadow-xl active:scale-95">
                    Update
                </button>
            </div>
        </header>

        <main class="max-w-7xl mx-auto grid grid-cols-1 lg:grid-cols-12 gap-8">
            
            <div class="lg:col-span-8 glass-panel p-8 md:p-12 relative overflow-hidden">
                <div class="flex justify-between items-start">
                    <div>
                        <div class="flex items-center gap-3 mb-2">
                            <span class="px-3 py-1 bg-green-500/20 text-green-400 text-[10px] font-bold rounded-full border border-green-500/30">
                                <span class="w-2 h-2 bg-green-500 inline-block rounded-full live-dot mr-1"></span> LIVE SYSTEM
                            </span>
                            <span id="currentDate" class="text-sm opacity-60 font-medium">---</span>
                        </div>
                        <h2 id="cityName" class="text-7xl font-black tracking-tighter mb-4">---</h2>
                        <div class="flex items-center gap-4">
                            <i id="conditionIcon" class="fas fa-sun text-4xl"></i>
                            <span id="conditionText" class="text-2xl font-semibold opacity-90 capitalize">---</span>
                        </div>
                    </div>
                    <div class="hidden md:block text-right">
                        <p class="text-sm opacity-50 uppercase tracking-widest font-bold">Feels Like</p>
                        <p id="feelsLike" class="text-4xl font-light">--°</p>
                    </div>
                </div>

                <div class="mt-16 flex items-baseline">
                    <span id="mainTemp" class="text-[10rem] font-black leading-none tracking-tighter">--</span>
                    <span class="text-6xl font-light opacity-30">°C</span>
                </div>

                <div class="grid grid-cols-2 md:grid-cols-4 gap-4 mt-12">
                    <div class="bg-black/10 p-6 rounded-3xl border border-white/5">
                        <i class="fas fa-wind text-blue-400 mb-2"></i>
                        <p id="windVal" class="text-xl font-bold">--</p>
                    </div>
                    <div class="bg-black/10 p-6 rounded-3xl border border-white/5">
                        <i class="fas fa-droplet text-cyan-400 mb-2"></i>
                        <p id="humidityVal" class="text-xl font-bold">--%</p>
                    </div>
                    <div class="bg-black/10 p-6 rounded-3xl border border-white/5">
                        <i class="fas fa-eye text-purple-400 mb-2"></i>
                        <p id="visibilityVal" class="text-xl font-bold">--</p>
                    </div>
                    <div class="bg-black/10 p-6 rounded-3xl border border-white/5">
                        <i class="fas fa-gauge-high text-orange-400 mb-2"></i>
                        <p id="pressureVal" class="text-xl font-bold">--</p>
                    </div>
                </div>
            </div>

            <div class="lg:col-span-4 flex flex-col gap-8">
                <div class="glass-panel p-8 flex-1">
                    <h3 class="text-lg font-bold mb-6">7-Day Intelligence</h3>
                    <div id="timelineContainer" class="space-y-4"></div>
                </div>

                <div class="glass-panel p-6 bg-gradient-to-br from-blue-600/20 to-transparent">
                    <div class="flex items-center gap-4">
                        <i id="sunIcon" class="fas fa-sun text-3xl text-yellow-500"></i>
                        <div>
                            <p id="sunCycle" class="text-sm font-bold">Sunrise: -- | Sunset: --</p>
                        </div>
                    </div>
                </div>
            </div>
        </main>
    </div>

    <script>
        const API_KEY = "c2447347133b76fb41c58963ca906bf5";
        let currentCondition = "Clear";

        const bgMap = {
            'Clear': 'https://images.unsplash.com/photo-1601297183305-6df142704ea2?auto=format&fit=crop&w=1920&q=80',
            'Clouds': 'https://images.unsplash.com/photo-1534088568595-a066f410bcda?auto=format&fit=crop&w=1920&q=80',
            'Rain': 'https://images.unsplash.com/photo-1534274988757-a28bf1a57c17?auto=format&fit=crop&w=1920&q=80',
            'Drizzle': 'https://images.unsplash.com/photo-1541339907198-e08756ebafe3?auto=format&fit=crop&w=1920&q=80',
            'Thunderstorm': 'https://images.unsplash.com/photo-1605727282300-249751421682?auto=format&fit=crop&w=1920&q=80',
            'Snow': 'https://images.unsplash.com/photo-1517299321529-790f826325a7?auto=format&fit=crop&w=1920&q=80',
            'Atmosphere': 'https://images.unsplash.com/photo-1485236715568-ddc5ee6ca227?auto=format&fit=crop&w=1920&q=80'
        };

        function changeMode(mode) {
            document.body.classList.remove('light-mode', 'dark-mode');
            if(mode !== 'default') document.body.classList.add(mode + '-mode');
            updateIcons(currentCondition);
        }

        async function fetchWeatherData() {
            const city = document.getElementById('citySearch').value || "Jalandhar";
            try {
                const res = await fetch(`https://api.openweathermap.org/data/2.5/weather?q=${city}&units=metric&appid=${API_KEY}`);
                const data = await res.json();
                if(data.cod !== 200) throw new Error(data.message);
                currentCondition = data.weather[0].main;
                updateMainUI(data);
                generateTimeline();
            } catch (err) { alert("Station Error: " + err.message); }
        }

        function updateMainUI(data) {
            const cond = data.weather[0].main;
            document.getElementById('bg-overlay').style.backgroundImage = `url('${bgMap[cond] || bgMap['Atmosphere']}')`;
            document.getElementById('cityName').innerText = data.name.toUpperCase();
            document.getElementById('mainTemp').innerText = Math.round(data.main.temp);
            document.getElementById('feelsLike').innerText = Math.round(data.main.feels_like) + "°";
            document.getElementById('conditionText').innerText = data.weather[0].description;
            document.getElementById('humidityVal').innerText = data.main.humidity + "%";
            document.getElementById('windVal').innerText = (data.wind.speed * 3.6).toFixed(1) + " km/h";
            document.getElementById('visibilityVal').innerText = (data.visibility / 1000).toFixed(1) + " km";
            document.getElementById('pressureVal').innerText = data.main.pressure;
            
            const format = (u) => new Date(u * 1000).toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'});
            document.getElementById('sunCycle').innerText = `Sunrise: ${format(data.sys.sunrise)} | Sunset: ${format(data.sys.sunset)}`;
            document.getElementById('currentDate').innerText = new Date().toLocaleDateString('en-US', {weekday:'long', month:'long', day:'numeric'}).toUpperCase();

            updateIcons(cond);
        }

        function updateIcons(cond) {
            const iconEl = document.getElementById('conditionIcon');
            const isDark = document.body.classList.contains('dark-mode');
            
            if(cond === 'Clear') {
                iconEl.className = isDark ? "fas fa-moon text-4xl text-blue-200" : "fas fa-sun text-4xl text-yellow-400";
            } else if (cond === 'Rain') {
                iconEl.className = "fas fa-cloud-showers-heavy text-4xl text-blue-400";
            } else if (cond === 'Atmosphere') {
                iconEl.className = "fas fa-smog text-4xl text-gray-400";
            } else {
                iconEl.className = "fas fa-cloud text-4xl text-gray-300";
            }
        }

        function generateTimeline() {
            const container = document.getElementById('timelineContainer');
            container.innerHTML = '';
            for (let i = -3; i <= 3; i++) {
                const isToday = i === 0;
                const item = document.createElement('div');
                item.className = `flex items-center justify-between p-4 rounded-2xl ${isToday ? 'weather-card-active' : 'bg-black/5'}`;
                item.innerHTML = `<span>${isToday ? 'TODAY' : 'DAY ' + i}</span><i class="fas fa-cloud"></i><span>${parseInt(document.getElementById('mainTemp').innerText) + i}°</span>`;
                container.appendChild(item);
            }
        }

        window.onload = fetchWeatherData;
    </script>
</body>
</html>
